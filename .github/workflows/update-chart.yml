name: Aggiorna dati Body Tracker

"on":
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Installa dipendenze Python
        run: pip install requests

      - name: Scarica dati Body Tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python body-tracker/fetch_notion.py

      - name: Scarica dati Tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python tracker/fetch_tracker.py

      - name: Commit e push dati aggiornati
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add body-tracker/data.json tracker/data.json
          git diff --cached --quiet || git commit -m "chore: aggiorna dati $(date -u '+%Y-%m-%d')"
          git push
