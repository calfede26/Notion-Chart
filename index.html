<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #191919;
      color: #e8e8e8;
      padding: 16px 20px 12px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .legend {
      display: flex;
      gap: 18px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.02em;
    }
    .legend-line {
      width: 16px;
      height: 1.5px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .updated {
      font-size: 10px;
      color: #444;
    }
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 260px;
    }
    .error { color: #e24b4a; font-size: 12px; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="legend">
      <div class="legend-item">
        <div class="legend-line" style="background:#4a9edd"></div>
        Distanza (km)
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#9b8fe8"></div>
        Sonno (pt.)
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#e8a83a"></div>
        Push-ups
      </div>
    </div>
    <span class="updated" id="updated"></span>
  </div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <div id="error"></div>

  <script>
    async function loadChart() {
      let data;
      try {
        const res = await fetch('data.json?t=' + Date.now());
        data = await res.json();
      } catch (e) {
        document.getElementById('error').innerHTML = '<p class="error">Errore nel caricamento dei dati.</p>';
        return;
      }

      if (data.updated) {
        document.getElementById('updated').textContent = new Date(data.updated).toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
      }

      const labels  = data.weeks.map(w => w.label.split('\n')[0]);
      const km      = data.weeks.map(w => w.km);
      const sleep   = data.weeks.map(w => w.sleep_score);
      const pushups = data.weeks.map(w => w.pushups);

      new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              data: km,
              borderColor: '#4a9edd',
              backgroundColor: 'rgba(74,158,221,0.06)',
              borderWidth: 1.5,
              pointRadius: 0,
              pointHoverRadius: 3,
              pointHoverBackgroundColor: '#4a9edd',
              tension: 0.4,
              fill: true,
              yAxisID: 'yLeft'
            },
            {
              data: sleep,
              borderColor: '#9b8fe8',
              backgroundColor: 'transparent',
              borderWidth: 1.5,
              pointRadius: 0,
              pointHoverRadius: 3,
              pointHoverBackgroundColor: '#9b8fe8',
              tension: 0.4,
              fill: false,
              yAxisID: 'ySleep'
            },
            {
              data: pushups,
              borderColor: '#e8a83a',
              backgroundColor: 'transparent',
              borderWidth: 1.5,
              pointRadius: 0,
              pointHoverRadius: 3,
              pointHoverBackgroundColor: '#e8a83a',
              tension: 0.4,
              fill: false,
              yAxisID: 'yRight'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#222',
              borderColor: '#333',
              borderWidth: 0.5,
              titleColor: '#aaa',
              bodyColor: '#777',
              padding: 10,
              titleFont: { size: 11 },
              bodyFont: { size: 11 },
              callbacks: {
                title: (items) => 'Settimana ' + (items[0].dataIndex + 1),
                label: (item) => {
                  const labels = ['km', 'pt.', 'push-ups'];
                  const colors = ['#4a9edd', '#9b8fe8', '#e8a83a'];
                  return `  ${item.parsed.y} ${labels[item.datasetIndex]}`;
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              border: { display: false },
              ticks: {
                color: '#444',
                font: { size: 10 },
                maxRotation: 0
              }
            },
            yLeft: {
              type: 'linear',
              position: 'left',
              min: 0,
              grid: {
                color: 'rgba(255,255,255,0.04)',
                drawTicks: false
              },
              border: { display: false, dash: [3, 3] },
              ticks: {
                color: '#444',
                font: { size: 9 },
                padding: 6,
                maxTicksLimit: 5,
                callback: v => v + ' km'
              }
            },
            ySleep: {
              type: 'linear',
              position: 'left',
              min: 65,
              max: 95,
              display: false,
              grid: { drawOnChartArea: false }
            },
            yRight: {
              type: 'linear',
              position: 'right',
              min: 0,
              grid: { drawOnChartArea: false },
              border: { display: false },
              ticks: {
                color: '#444',
                font: { size: 9 },
                padding: 6,
                maxTicksLimit: 5
              }
            }
          }
        }
      });
    }
    loadChart();
  </script>
</body>
</html>
